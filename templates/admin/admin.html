<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vodogray Admin</title>
    <link rel="stylesheet" href="static/style/admin/login.css">
    <link rel="stylesheet" href="static/style/admin/admin.css">
</head>

<body>
    <section class="sing-in" id="sing-in">
        <h1>Vodogray Hotell Admin</h1>

        <form action="" method="post">
            <label for="userLogin">Login</label>
            <input type="text" name="login" id="userLogin" placeholder="Enter login">

            <label for="userPassword">Password</label>
            <input type="password" name="password" id="userPassword" placeholder="Enter password">

            <button type="submit" id="submitBtn">Enter</button>
        </form>
    </section>

    <section class="admin" id="admin">
        <div class="admin-about-us">
            <img src="static/img/vodogray.png" alt="">

            <div class="info">
                <h2>About Us block</h2>

                <form action="" method="post">
                    <input type="file" name="photo" id="">

                    <button type="submit" id="load">Load</button>
                </form>
            </div>

        </div>

        <div class="admin-rooms">
            <div class="admin-room">
                <img src="static/img/vodogray.png" alt="">

                <div class="info">
                    <h2>Room jallery</h2>

                    <form action="" method="post">
                        <input type="file" name="photo" id="">

                        <button type="submit" id="load">Load</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="static/js/admin/admin.js"></script>
</body>

</html>
